<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>申请退款 - OpenMall</title>
</head>
<body>
<div class="container py-4">
    <h4 class="mb-4">申请退款</h4>
    <div class="card">
        <div class="card-body">
            <form id="refundForm">
                <input type="hidden" name="orderNo" th:value="${orderNo}">
                <div class="mb-3">
                    <label class="form-label">订单号</label>
                    <input type="text" class="form-control" th:value="${orderNo}" disabled>
                </div>
                <div class="mb-3">
                    <label class="form-label">退款类型</label>
                    <select name="refundType" class="form-select">
                        <option value="1">仅退款</option>
                        <option value="2">退货退款</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">退款原因</label>
                    <textarea name="reason" class="form-control" rows="4" placeholder="请描述退款原因"></textarea>
                </div>
                <button type="submit" class="btn btn-danger">提交申请</button>
            </form>
        </div>
    </div>
</div>

<script>
document.getElementById('refundForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const formData = new FormData(this);
    const data = Object.fromEntries(formData.entries());
    data.refundType = parseInt(data.refundType);

    fetch('/refund/apply', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    })
    .then(r => r.json())
    .then(res => {
        if (res.code === 200) {
            alert('退款申请已提交');
            location.href = '/refund/list';
        } else {
            alert(res.message || '提交失败');
        }
    })
    .catch(() => alert('网络错误'));
});
</script>
</body>
</html>
