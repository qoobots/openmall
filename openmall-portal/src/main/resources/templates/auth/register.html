<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/main :: main(~{::title}, ~{::head-link}, ~{::main-content}, ~{::script})">
<head>
    <title>用户注册 - OpenMall</title>
    <link th:fragment="head-link" th:href="@{/css/auth.css}" rel="stylesheet">
</head>
<body>
    <main th:fragment="main-content" class="auth-page">
        <div class="container">
            <div class="row justify-content-center align-items-center min-vh-100">
                <div class="col-md-5">
                    <div class="card shadow">
                        <div class="card-body p-5">
                            <div class="text-center mb-4">
                                <i class="fas fa-shopping-bag fa-3x text-primary"></i>
                                <h2 class="mt-3">用户注册</h2>
                            </div>
                            
                            <form th:action="@{/auth/do-register}" method="post" id="registerForm">
                                <div class="mb-3">
                                    <label for="username" class="form-label">用户名</label>
                                    <input type="text" class="form-control" id="username" name="username" required
                                           pattern="^[a-zA-Z0-9_]{4,20}$"
                                           title="用户名必须是4-20位字母、数字或下划线">
                                    <small class="form-text text-muted">4-20位字母、数字或下划线</small>
                                </div>
                                <div class="mb-3">
                                    <label for="nickname" class="form-label">昵称</label>
                                    <input type="text" class="form-control" id="nickname" name="nickname">
                                </div>
                                <div class="mb-3">
                                    <label for="mobile" class="form-label">手机号</label>
                                    <input type="tel" class="form-control" id="mobile" name="mobile"
                                           pattern="^1[3-9]\d{9}$"
                                           title="请输入正确的手机号">
                                </div>
                                <div class="mb-3">
                                    <label for="email" class="form-label">邮箱</label>
                                    <input type="email" class="form-control" id="email" name="email">
                                </div>
                                <div class="mb-3">
                                    <label for="password" class="form-label">密码</label>
                                    <input type="password" class="form-control" id="password" name="password" required
                                           minlength="6" title="密码长度至少6位">
                                </div>
                                <div class="mb-3">
                                    <label for="confirmPassword" class="form-label">确认密码</label>
                                    <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required>
                                </div>
                                <button type="submit" class="btn btn-primary w-100">注册</button>
                            </form>
                            
                            <div class="text-center mt-3">
                                <p>已有账号？ <a th:href="@{/auth/login}">立即登录</a></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script th:fragment="script">
    <script>
        $(document).ready(function() {
            $('#registerForm').submit(function(e) {
                var password = $('#password').val();
                var confirmPassword = $('#confirmPassword').val();
                
                if (password !== confirmPassword) {
                    Swal.fire({
                        icon: 'error',
                        title: '错误',
                        text: '两次输入的密码不一致'
                    });
                    e.preventDefault();
                    return false;
                }
            });
        });
    </script>
    </script>
</body>
</html>
