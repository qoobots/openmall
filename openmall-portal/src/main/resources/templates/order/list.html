<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/main :: main(~{::title}, ~{::head-link}, ~{::main-content}, ~{::script})">
<head>
    <title>我的订单 - OpenMall</title>
    <link th:href="@{/css/order.css}" rel="stylesheet">
</head>
<body>
    <main th:fragment="main-content">
        <div class="container mt-4">
            <div class="row">
                <!-- 侧边栏 -->
                <div class="col-md-3">
                    <div th:replace="user/index :: user-sidebar"></div>
                </div>
                
                <!-- 主要内容 -->
                <div class="col-md-9">
                    <div class="user-main-content">
                        <h3>我的订单</h3>
                        
                        <!-- 订单状态筛选 -->
                        <ul class="nav nav-tabs mb-4">
                            <li class="nav-item">
                                <a class="nav-link" th:href="@{/order/list}" th:classappend="${status == null ? 'active' : ''}">全部订单</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" th:href="@{/order/list(status=1)}" th:classappend="${status == 1 ? 'active' : ''}">待付款</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" th:href="@{/order/list(status=2)}" th:classappend="${status == 2 ? 'active' : ''}">待发货</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" th:href="@{/order/list(status=3)}" th:classappend="${status == 3 ? 'active' : ''}">待收货</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" th:href="@{/order/list(status=4)}" th:classappend="${status == 4 ? 'active' : ''}">已完成</a>
                            </li>
                        </ul>
                        
                        <!-- 订单列表 -->
                        <div class="order-list" th:if="${page?.content != null and !page.content.isEmpty()}">
                            <div class="order-item mb-4" th:each="order : ${page.content}">
                                <div class="order-header">
                                    <div class="order-info">
                                        <span>订单号：<span th:text="${order.orderNo}">202401010001</span></span>
                                        <span class="ms-3" th:text="${order.shopName}">店铺名称</span>
                                    </div>
                                    <div class="order-time">
                                        <span th:text="${#temporals.format(order.createTime, 'yyyy-MM-dd HH:mm')}">2024-01-01 12:00</span>
                                    </div>
                                </div>
                                
                                <div class="order-items">
                                    <div class="order-product" th:each="item : ${order.items}">
                                        <img th:src="${item.mainImage}" alt="商品图片" class="product-image">
                                        <div class="product-info">
                                            <h6>
                                                <a th:href="@{/product/detail/{id}(id=${item.spuId})}" th:text="${item.productName}">商品名称</a>
                                            </h6>
                                            <p class="text-muted" th:text="${item.specs}">规格</p>
                                        </div>
                                        <div class="product-price">
                                            <div class="price" th:text="'¥' + ${item.price}">¥99.00</div>
                                            <div class="quantity">x<span th:text="${item.quantity}">1</span></div>
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="order-footer">
                                    <div class="order-amount">
                                        共 <span th:text="${order.totalQuantity}">1</span> 件商品 
                                        实付：<span class="total-amount" th:text="'¥' + ${order.payAmount}">¥99.00</span>
                                    </div>
                                    <div class="order-status">
                                        <span class="badge" th:classappend="${order.statusBadge}" th:text="${order.statusText}">待付款</span>
                                    </div>
                                    <div class="order-actions">
                                        <button class="btn btn-sm btn-primary" 
                                                th:if="${order.orderStatus == 1}"
                                                th:data-order-no="${order.orderNo}"
                                                onclick="payOrder(this)">立即付款</button>
                                        <button class="btn btn-sm btn-info" 
                                                th:if="${order.orderStatus == 3}"
                                                th:data-order-no="${order.orderNo}"
                                                onclick="viewLogistics(this)">查看物流</button>
                                        <button class="btn btn-sm btn-success" 
                                                th:if="${order.orderStatus == 3}"
                                                th:data-order-id="${order.id}"
                                                onclick="confirmReceipt(this)">确认收货</button>
                                        <a th:href="@{/order/detail/{id}(id=${order.id})}" 
                                           class="btn btn-sm btn-outline-secondary">订单详情</a>
                                        <button class="btn btn-sm btn-outline-danger" 
                                                th:if="${order.orderStatus == 1}"
                                                th:data-order-id="${order.id}"
                                                onclick="cancelOrder(this)">取消订单</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 空状态 -->
                        <div class="empty-state" th:if="${page?.content == null or page.content.isEmpty()}">
                            <i class="fas fa-shopping-bag"></i>
                            <p>暂无订单</p>
                            <a th:href="@{/}" class="btn btn-primary">去购物</a>
                        </div>
                        
                        <!-- 分页 -->
                        <div th:if="${page != null and page.totalPages > 1}" 
                             th:replace="fragments/pagination :: pagination(page, ${'/order/list'})">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script th:fragment="script">
    <script>
        $(document).ready(function() {
            // 初始化
            console.log('订单列表页面加载完成');
        });
        
        // 立即付款
        function payOrder(btn) {
            const orderNo = $(btn).data('order-no');
            window.location.href = '/order/payment?orderNo=' + orderNo;
        }
        
        // 查看物流
        function viewLogistics(btn) {
            const orderNo = $(btn).data('order-no');
            showLoading();
            
            ajaxRequest('/order/logistics/' + orderNo, 'GET', null, function(response) {
                hideLoading();
                const logistics = response.data;
                
                let html = '<div class="logistics-info">';
                html += '<p><strong>快递公司：</strong>' + logistics.company + '</p>';
                html += '<p><strong>快递单号：</strong>' + logistics.trackingNo + '</p>';
                html += '<div class="logistics-list mt-3">';
                
                logistics.traces.forEach(function(trace) {
                    html += '<div class="logistics-item">';
                    html += '<div class="logistics-time">' + trace.time + '</div>';
                    html += '<div class="logistics-desc">' + trace.desc + '</div>';
                    html += '</div>';
                });
                
                html += '</div></div>';
                
                Swal.fire({
                    title: '物流信息',
                    html: html,
                    width: '600px',
                    showConfirmButton: false,
                    showCloseButton: true
                });
            });
        }
        
        // 确认收货
        function confirmReceipt(btn) {
            const orderId = $(btn).data('order-id');
            
            confirmDialog('确认收货', '请确认已收到商品', function() {
                ajaxRequest('/order/confirmReceipt', 'POST', {orderId: orderId}, function(response) {
                    successAlert('成功', '已确认收货');
                    location.reload();
                });
            });
        }
        
        // 取消订单
        function cancelOrder(btn) {
            const orderId = $(btn).data('order-id');
            
            confirmDialog('取消订单', '确定要取消该订单吗？', function() {
                ajaxRequest('/order/cancel', 'POST', {orderId: orderId}, function(response) {
                    successAlert('成功', '订单已取消');
                    location.reload();
                });
            });
        }
    </script>
    </script>
</body>
</html>
