<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/main :: main(~{::title}, ~{::head-link}, ~{::main-content}, ~{::script})">
<head>
    <title>收货地址 - OpenMall</title>
    <link th:href="@{/css/user.css}" rel="stylesheet">
</head>
<body>
    <main th:fragment="main-content">
        <div class="container mt-4">
            <div class="row">
                <!-- 侧边栏 -->
                <div class="col-md-3">
                    <div th:replace="user/index :: user-sidebar"></div>
                </div>
                
                <!-- 主要内容 -->
                <div class="col-md-9">
                    <div class="user-main-content">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h3>收货地址管理</h3>
                            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addressModal">
                                <i class="fas fa-plus"></i> 新增地址
                            </button>
                        </div>
                        
                        <div class="address-list">
                            <div class="row">
                                <div class="col-md-6 col-lg-4 mb-3" th:each="address : ${addresses}">
                                    <div class="address-card" th:classappend="${address.default ? 'address-default' : ''}">
                                        <div class="card-header">
                                            <h6 class="mb-0">
                                                <span th:text="${address.consigneeName}">张三</span>
                                                <span class="badge bg-primary ms-2" th:if="${address.default}">默认</span>
                                            </h6>
                                        </div>
                                        <div class="card-body">
                                            <div class="address-info">
                                                <p><i class="fas fa-phone"></i> <span th:text="${address.consigneePhone}">13800000000</span></p>
                                                <p><i class="fas fa-map-marker-alt"></i> 
                                                    <span th:text="${address.province}">广东省</span>
                                                    <span th:text="${address.city}">深圳市</span>
                                                    <span th:text="${address.district}">南山区</span>
                                                    <span th:text="${address.detailAddress}">科技园xxx路xxx号</span>
                                                </p>
                                            </div>
                                        </div>
                                        <div class="card-footer">
                                            <div class="d-flex justify-content-between">
                                                <button class="btn btn-sm btn-link text-primary" 
                                                        th:if="${!address.default}"
                                                        onclick="setDefaultAddress([[${address.id}]])">
                                                    设为默认
                                                </button>
                                                <button class="btn btn-sm btn-link text-secondary" disabled
                                                        th:if="${address.default}">
                                                    默认地址
                                                </button>
                                                <div>
                                                    <button class="btn btn-sm btn-link text-info" 
                                                            th:data-address-id="${address.id}"
                                                            onclick="editAddress(this)">
                                                        编辑
                                                    </button>
                                                    <button class="btn btn-sm btn-link text-danger" 
                                                            th:data-address-id="${address.id}"
                                                            onclick="deleteAddress(this)">
                                                        删除
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 地址模态框 -->
        <div class="modal fade" id="addressModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">新增收货地址</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <form id="addressForm">
                        <div class="modal-body">
                            <input type="hidden" id="addressId" name="id">
                            <div class="mb-3">
                                <label class="form-label">收货人姓名</label>
                                <input type="text" class="form-control" name="consigneeName" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">手机号码</label>
                                <input type="tel" class="form-control" name="consigneePhone" required 
                                       pattern="^1[3-9]\d{9}$" maxlength="11">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">所在地区</label>
                                <div class="row">
                                    <div class="col-md-4">
                                        <select class="form-select" name="province" id="province" required>
                                            <option value="">请选择省份</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4">
                                        <select class="form-select" name="city" id="city" required>
                                            <option value="">请选择城市</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4">
                                        <select class="form-select" name="district" id="district" required>
                                            <option value="">请选择区县</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">详细地址</label>
                                <textarea class="form-control" name="detailAddress" rows="2" 
                                          placeholder="请输入详细地址，如街道、门牌号等" required></textarea>
                            </div>
                            <div class="mb-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="isDefault" value="1">
                                    <label class="form-check-label">
                                        设为默认地址
                                    </label>
                                </div>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                            <button type="submit" class="btn btn-primary">保存</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script th:fragment="script">
    <script src="https://cdn.jsdelivr.net/npm/distpicker@2.0.6/dist/distpicker.min.js"></script>
    <script>
        $(document).ready(function() {
            // 初始化地区选择器
            $('#addressForm').distpicker({
                province: 'province',
                city: 'city',
                district: 'district'
            });
            
            // 表单提交
            $('#addressForm').submit(function(e) {
                e.preventDefault();
                
                const formData = {
                    id: $('#addressId').val(),
                    consigneeName: $('input[name="consigneeName"]').val(),
                    consigneePhone: $('input[name="consigneePhone"]').val(),
                    province: $('#province').val(),
                    city: $('#city').val(),
                    district: $('#district').val(),
                    detailAddress: $('textarea[name="detailAddress"]').val(),
                    isDefault: $('input[name="isDefault"]').is(':checked') ? 1 : 0
                };
                
                ajaxRequest('/user/address/save', 'POST', formData, function(response) {
                    successAlert('成功', '地址保存成功');
                    $('#addressModal').modal('hide');
                    location.reload();
                });
            });
        });
        
        // 编辑地址
        function editAddress(btn) {
            const addressId = $(btn).data('address-id');
            
            ajaxRequest('/user/address/get/' + addressId, 'GET', null, function(response) {
                const address = response.data;
                $('#addressId').val(address.id);
                $('input[name="consigneeName"]').val(address.consigneeName);
                $('input[name="consigneePhone"]').val(address.consigneePhone);
                $('textarea[name="detailAddress"]').val(address.detailAddress);
                $('input[name="isDefault"]').prop('checked', address.default);
                
                // 设置地区
                $('#province').val(address.province).trigger('change');
                setTimeout(() => {
                    $('#city').val(address.city).trigger('change');
                    setTimeout(() => {
                        $('#district').val(address.district);
                    }, 100);
                }, 100);
                
                $('.modal-title').text('编辑收货地址');
                $('#addressModal').modal('show');
            });
        }
        
        // 删除地址
        function deleteAddress(btn) {
            const addressId = $(btn).data('address-id');
            
            confirmDialog('删除地址', '确定要删除这个收货地址吗？', function() {
                ajaxRequest('/user/address/delete/' + addressId, 'DELETE', null, function(response) {
                    successAlert('成功', '地址已删除');
                    location.reload();
                });
            });
        }
        
        // 设为默认地址
        function setDefaultAddress(addressId) {
            ajaxRequest('/user/address/setDefault/' + addressId, 'POST', null, function(response) {
                successAlert('成功', '已设为默认地址');
                location.reload();
            });
        }
        
        // 模态框关闭时重置表单
        $('#addressModal').on('hidden.bs.modal', function() {
            $('#addressForm')[0].reset();
            $('#addressId').val('');
            $('.modal-title').text('新增收货地址');
        });
    </script>
    </script>
</body>
</html>
