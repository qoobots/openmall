<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/main :: main(~{::title}, ~{::head-link}, ~{::main-content}, ~{::script})">
<head>
    <title>我的收藏 - OpenMall</title>
    <link th:href="@{/css/user.css}" rel="stylesheet">
</head>
<body>
    <main th:fragment="main-content">
        <div class="container mt-4">
            <div class="row">
                <!-- 侧边栏 -->
                <div class="col-md-3">
                    <div th:replace="user/index :: user-sidebar"></div>
                </div>
                
                <!-- 主要内容 -->
                <div class="col-md-9">
                    <div class="user-main-content">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h3>我的收藏</h3>
                            <button class="btn btn-sm btn-outline-danger" id="batchDeleteBtn" 
                                    style="display: none;" onclick="batchDeleteFavorites()">
                                批量删除
                            </button>
                        </div>
                        
                        <div class="favorite-list" th:if="${page?.content != null and !page.content.isEmpty()}">
                            <div class="row">
                                <div class="col-md-6 col-lg-4 mb-4" th:each="item : ${page.content}">
                                    <div class="favorite-item">
                                        <div class="item-image">
                                            <a th:href="@{/product/detail/{id}(id=${item.spuId})}">
                                                <img th:src="${item.mainImage}" alt="商品图片" class="img-fluid">
                                            </a>
                                            <div class="item-checkbox">
                                                <input type="checkbox" class="form-check-input" 
                                                       th:value="${item.spuId}" name="favoriteItem">
                                            </div>
                                        </div>
                                        <div class="item-info">
                                            <h6 class="item-title">
                                                <a th:href="@{/product/detail/{id}(id=${item.spuId})}" 
                                                   th:text="${item.productName}">商品名称</a>
                                            </h6>
                                            <div class="item-price">
                                                <span class="price" th:text="'¥' + ${item.price}">¥99.00</span>
                                                <span class="original-price" th:if="${item.originalPrice > item.price}" 
                                                      th:text="'¥' + ${item.originalPrice}">¥199.00</span>
                                            </div>
                                            <div class="item-actions">
                                                <button class="btn btn-sm btn-primary add-to-cart" 
                                                        th:data-sku-id="${item.skuId}"
                                                        th:data-spu-id="${item.spuId}"
                                                        onclick="addToCart(this)">
                                                    <i class="fas fa-shopping-cart"></i> 加入购物车
                                                </button>
                                                <button class="btn btn-sm btn-link text-danger" 
                                                        th:data-spu-id="${item.spuId}"
                                                        onclick="removeFavorite(this)">
                                                    <i class="fas fa-trash"></i> 删除
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 空状态 -->
                        <div class="empty-state" th:if="${page?.content == null or page.content.isEmpty()}">
                            <i class="fas fa-heart"></i>
                            <p>暂无收藏商品</p>
                            <a th:href="@{/}" class="btn btn-primary">去逛逛</a>
                        </div>
                        
                        <!-- 分页 -->
                        <div th:if="${page != null and page.totalPages > 1}" 
                             th:replace="fragments/pagination :: pagination(page, ${'/user/favorite'})">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script th:fragment="script">
    <script>
        $(document).ready(function() {
            // 全选/取消全选
            $('.favorite-item .item-checkbox input').change(function() {
                updateBatchDeleteBtn();
            });
        });
        
        // 更新批量删除按钮状态
        function updateBatchDeleteBtn() {
            const checkedCount = $('input[name="favoriteItem"]:checked').length;
            if (checkedCount > 0) {
                $('#batchDeleteBtn').show();
                $('#batchDeleteBtn').text('批量删除 (' + checkedCount + ')');
            } else {
                $('#batchDeleteBtn').hide();
            }
        }
        
        // 加入购物车
        function addToCart(btn) {
            const spuId = $(btn).data('spu-id');
            const skuId = $(btn).data('sku-id');
            
            if (!skuId) {
                // 如果没有skuId，跳转到商品详情页选择规格
                window.location.href = '/product/detail/' + spuId;
                return;
            }
            
            ajaxRequest('/cart/add', 'POST', {
                spuId: spuId,
                skuId: skuId,
                quantity: 1
            }, function(response) {
                successAlert('成功', '已加入购物车');
                updateCartCount();
            });
        }
        
        // 删除收藏
        function removeFavorite(btn) {
            const spuId = $(btn).data('spu-id');
            
            confirmDialog('删除收藏', '确定要删除这个收藏商品吗？', function() {
                ajaxRequest('/favorite/remove', 'POST', {spuId: spuId}, function(response) {
                    successAlert('成功', '已删除收藏');
                    location.reload();
                });
            });
        }
        
        // 批量删除
        function batchDeleteFavorites() {
            const spuIds = [];
            $('input[name="favoriteItem"]:checked').each(function() {
                spuIds.push($(this).val());
            });
            
            if (spuIds.length === 0) {
                errorAlert('提示', '请选择要删除的商品');
                return;
            }
            
            confirmDialog('批量删除', '确定要删除选中的 ' + spuIds.length + ' 个收藏商品吗？', function() {
                ajaxRequest('/favorite/batchRemove', 'POST', {spuIds: spuIds}, function(response) {
                    successAlert('成功', '已批量删除收藏');
                    location.reload();
                });
            });
        }
    </script>
    </script>
</body>
</html>
