<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密码 - OpenMall</title>
</head>
<body>
<div class="container py-4">
    <h4 class="mb-4">修改密码</h4>
    <div class="card">
        <div class="card-body">
            <form id="passwordForm">
                <div class="mb-3">
                    <label class="form-label">原密码</label>
                    <input type="password" name="oldPassword" class="form-control" required placeholder="请输入原密码">
                </div>
                <div class="mb-3">
                    <label class="form-label">新密码</label>
                    <input type="password" name="newPassword" class="form-control" required placeholder="请输入新密码（至少6位）" minlength="6">
                </div>
                <div class="mb-3">
                    <label class="form-label">确认新密码</label>
                    <input type="password" name="confirmPassword" class="form-control" required placeholder="请再次输入新密码" minlength="6">
                </div>
                <button type="submit" class="btn btn-primary">确认修改</button>
            </form>
        </div>
    </div>
</div>

<script>
document.getElementById('passwordForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const formData = new FormData(this);
    const params = new URLSearchParams(formData);

    fetch('/user/password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: params
    })
    .then(r => r.json())
    .then(data => {
        if (data.code === 200) {
            alert('密码修改成功，请重新登录');
            location.href = '/logout';
        } else {
            alert(data.message || '修改失败');
        }
    })
    .catch(() => alert('网络错误'));
});
</script>
</body>
</html>
