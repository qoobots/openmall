<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/main :: main(~{::title}, ~{::head-link}, ~{::main-content}, ~{::script})">
<head>
    <title>用户中心 - OpenMall</title>
    <link th:href="@{/css/user.css}" rel="stylesheet">
</head>
<body>
    <main th:fragment="main-content">
        <div class="container mt-4">
            <div class="row">
                <!-- 侧边栏 -->
                <div class="col-md-3">
                    <div class="user-sidebar">
                        <div class="user-info-card">
                            <div class="avatar">
                                <img th:src="${user?.avatar ?: '/images/default-avatar.png'}" alt="头像" class="rounded-circle">
                            </div>
                            <div class="user-info">
                                <h5 th:text="${user?.nickname ?: '用户昵称'}">用户昵称</h5>
                                <p th:text="${user?.mobile}">手机号</p>
                            </div>
                        </div>
                        
                        <ul class="nav flex-column user-nav">
                            <li class="nav-item">
                                <a class="nav-link active" th:href="@{/user/index}">
                                    <i class="fas fa-user"></i> 个人中心
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" th:href="@{/order/list}">
                                    <i class="fas fa-list"></i> 我的订单
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" th:href="@{/user/favorite}">
                                    <i class="fas fa-heart"></i> 我的收藏
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" th:href="@{/user/address}">
                                    <i class="fas fa-map-marker-alt"></i> 收货地址
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" th:href="@{/user/profile}">
                                    <i class="fas fa-cog"></i> 个人资料
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" th:href="@{/user/security}">
                                    <i class="fas fa-shield-alt"></i> 账号安全
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
                
                <!-- 主要内容 -->
                <div class="col-md-9">
                    <div class="user-main-content">
                        <h3>用户中心</h3>
                        
                        <!-- 订单统计 -->
                        <div class="order-statistics mb-4">
                            <div class="row">
                                <div class="col-md-3">
                                    <div class="stat-card">
                                        <div class="stat-icon">
                                            <i class="fas fa-clock text-warning"></i>
                                        </div>
                                        <div class="stat-info">
                                            <h5 th:text="${statistics?.pendingPaymentCount ?: 0}">0</h5>
                                            <p>待付款</p>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="stat-card">
                                        <div class="stat-icon">
                                            <i class="fas fa-shipping-fast text-info"></i>
                                        </div>
                                        <div class="stat-info">
                                            <h5 th:text="${statistics?.pendingShipmentCount ?: 0}">0</h5>
                                            <p>待发货</p>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="stat-card">
                                        <div class="stat-icon">
                                            <i class="fas fa-truck text-primary"></i>
                                        </div>
                                        <div class="stat-info">
                                            <h5 th:text="${statistics?.shippedCount ?: 0}">0</h5>
                                            <p>已发货</p>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="stat-card">
                                        <div class="stat-icon">
                                            <i class="fas fa-check-circle text-success"></i>
                                        </div>
                                        <div class="stat-info">
                                            <h5 th:text="${statistics?.completedCount ?: 0}">0</h5>
                                            <p>已完成</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 最近订单 -->
                        <div class="recent-orders">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h5>最近订单</h5>
                                <a th:href="@{/order/list}" class="btn btn-sm btn-primary">查看全部</a>
                            </div>
                            
                            <div class="order-list" th:if="${recentOrders != null and !recentOrders.isEmpty()}">
                                <div class="order-item" th:each="order : ${recentOrders}">
                                    <div class="order-header">
                                        <div class="order-info">
                                            <span>订单号：<span th:text="${order.orderNo}">202401010001</span></span>
                                            <span class="ms-3">下单时间：<span th:text="${#temporals.format(order.createTime, 'yyyy-MM-dd HH:mm')}">2024-01-01 12:00</span></span>
                                        </div>
                                        <div class="order-status">
                                            <span class="badge" th:classappend="${order.statusBadge}" th:text="${order.statusText}">待付款</span>
                                        </div>
                                    </div>
                                    <div class="order-items">
                                        <div class="order-product" th:each="item : ${order.items}">
                                            <img th:src="${item.mainImage}" alt="商品图片" class="product-image">
                                            <div class="product-info">
                                                <h6 th:text="${item.productName}">商品名称</h6>
                                                <p th:text="${item.specs}">规格</p>
                                            </div>
                                            <div class="product-price">
                                                <span th:text="'¥' + ${item.price}">¥99.00</span>
                                                <span class="quantity">x <span th:text="${item.quantity}">1</span></span>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="order-footer">
                                        <div class="order-total">
                                            实付金额：<span class="total-amount" th:text="'¥' + ${order.payAmount}">¥99.00</span>
                                        </div>
                                        <div class="order-actions">
                                            <button class="btn btn-sm btn-primary" th:if="${order.orderStatus == 1}">立即付款</button>
                                            <button class="btn btn-sm btn-info" th:if="${order.orderStatus == 3}">查看物流</button>
                                            <button class="btn btn-sm btn-success" th:if="${order.orderStatus == 3}">确认收货</button>
                                            <a th:href="@{/order/detail/{id}(id=${order.id})}" class="btn btn-sm btn-outline-secondary">订单详情</a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="empty-state" th:if="${recentOrders == null or recentOrders.isEmpty()}">
                                <i class="fas fa-shopping-bag"></i>
                                <p>暂无订单</p>
                                <a th:href="@{/}" class="btn btn-primary">去购物</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script th:fragment="script">
    <script>
        $(document).ready(function() {
            // 确认收货
            $('.btn-confirm-receipt').click(function() {
                const orderId = $(this).data('order-id');
                confirmDialog('确认收货', '请确认已收到商品', function() {
                    ajaxRequest('/order/confirmReceipt', 'POST', {orderId: orderId}, function(response) {
                        successAlert('成功', '已确认收货');
                        location.reload();
                    });
                });
            });
        });
    </script>
    </script>
</body>
</html>
