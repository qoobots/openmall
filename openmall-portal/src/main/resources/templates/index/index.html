<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>首页 - OpenMall</title>
</head>
<body>
<div layout:fragment="content">
    <!-- 轮播图 -->
    <section class="hero-section">
        <div id="carouselExample" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-indicators">
                <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="0" class="active"></button>
                <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="1"></button>
                <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="2"></button>
            </div>
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <div class="carousel-slide" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                        <div class="container">
                            <div class="carousel-caption">
                                <h2>新用户注册立减50元</h2>
                                <p>限时优惠，先到先得</p>
                                <a th:href="@{/register}" class="btn btn-light btn-lg">立即注册</a>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="carousel-item">
                    <div class="carousel-slide" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                        <div class="container">
                            <div class="carousel-caption">
                                <h2>品质好货，放心购买</h2>
                                <p>严选品牌，正品保障</p>
                                <a th:href="@{/product/list}" class="btn btn-light btn-lg">立即选购</a>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="carousel-item">
                    <div class="carousel-slide" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">
                        <div class="container">
                            <div class="carousel-caption">
                                <h2>全场包邮，极速发货</h2>
                                <p>24小时内发货</p>
                                <a th:href="@{/product/list}" class="btn btn-light btn-lg">去看看</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>
        </div>
    </section>

    <!-- 推荐商品 -->
    <section class="section-padding">
        <div class="container">
            <div class="section-title">
                <h2>为你推荐</h2>
                <a th:href="@{/product/list}" class="btn-more">查看更多 <i class="fas fa-angle-right"></i></a>
            </div>
            <div class="row">
                <div class="col-md-3" th:each="product : ${recommendProducts}">
                    <div class="product-card">
                        <a th:href="@{/product/detail/{id}(id=${product.id})}" class="product-image">
                            <img th:src="${product.mainImage}" alt="${product.productName}">
                        </a>
                        <div class="product-info">
                            <h3 class="product-title">
                                <a th:href="@{/product/detail/{id}(id=${product.id})}" th:text="${product.productName}"></a>
                            </h3>
                            <div class="product-price">
                                <span class="price" th:text="'¥' + ${product.minPrice}"></span>
                                <span class="sales" th:text="'已售' + ${product.sales}"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 热门商品 -->
    <section class="section-padding bg-light">
        <div class="container">
            <div class="section-title">
                <h2>热门商品</h2>
                <a th:href="@{/product/list(sortBy='sales')}" class="btn-more">查看更多 <i class="fas fa-angle-right"></i></a>
            </div>
            <div class="row">
                <div class="col-md-3" th:each="product : ${hotProducts}">
                    <div class="product-card">
                        <a th:href="@{/product/detail/{id}(id=${product.id})}" class="product-image">
                            <img th:src="${product.mainImage}" alt="${product.productName}">
                        </a>
                        <div class="product-info">
                            <h3 class="product-title">
                                <a th:href="@{/product/detail/{id}(id=${product.id})}" th:text="${product.productName}"></a>
                            </h3>
                            <div class="product-price">
                                <span class="price" th:text="'¥' + ${product.minPrice}"></span>
                                <span class="sales" th:text="'已售' + ${product.sales}"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 新品上市 -->
    <section class="section-padding">
        <div class="container">
            <div class="section-title">
                <h2>新品上市</h2>
                <a th:href="@{/product/list}" class="btn-more">查看更多 <i class="fas fa-angle-right"></i></a>
            </div>
            <div class="row">
                <div class="col-md-3" th:each="product : ${newProducts}">
                    <div class="product-card">
                        <a th:href="@{/product/detail/{id}(id=${product.id})}" class="product-image">
                            <img th:src="${product.mainImage}" alt="${product.productName}">
                            <div class="badge-new">新品</div>
                        </a>
                        <div class="product-info">
                            <h3 class="product-title">
                                <a th:href="@{/product/detail/{id}(id=${product.id})}" th:text="${product.productName}"></a>
                            </h3>
                            <div class="product-price">
                                <span class="price" th:text="'¥' + ${product.minPrice}"></span>
                                <span class="sales" th:text="'已售' + ${product.sales}"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>
</body>
</html>
