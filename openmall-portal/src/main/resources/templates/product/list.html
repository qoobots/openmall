<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>商品列表 - OpenMall</title>
</head>
<body>
<div layout:fragment="content">
    <!-- 面包屑 -->
    <div class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/}">首页</a></li>
                <li class="breadcrumb-item active">商品列表</li>
            </ol>
        </nav>
    </div>

    <div class="container">
        <div class="row">
            <!-- 侧边栏筛选 -->
            <div class="col-md-2">
                <div class="filter-sidebar">
                    <div class="filter-group">
                        <h5>分类</h5>
                        <ul class="list-unstyled">
                            <li><a th:href="@{/product/list(categoryId=1)}">手机数码</a></li>
                            <li><a th:href="@{/product/list(categoryId=2)}">电脑办公</a></li>
                            <li><a th:href="@{/product/list(categoryId=3)}">家用电器</a></li>
                            <li><a th:href="@{/product/list(categoryId=4)}">服饰鞋包</a></li>
                            <li><a th:href="@{/product/list(categoryId=5)}">食品生鲜</a></li>
                        </ul>
                    </div>
                </div>
            </div>

            <!-- 商品列表 -->
            <div class="col-md-10">
                <!-- 排序和筛选 -->
                <div class="filter-bar">
                    <div class="row align-items-center">
                        <div class="col-md-6">
                            <span>共找到 <strong th:text="${page.total}"></strong> 件商品</span>
                        </div>
                        <div class="col-md-6 text-end">
                            <span>排序：</span>
                            <a th:class="${sortBy == null || sortBy == ''} ? 'active' : ''"
                               th:href="@{/product/list(keyword=${keyword}, categoryId=${categoryId}, sortBy='')}">综合</a>
                            <a th:class="${sortBy == 'sales'} ? 'active' : ''"
                               th:href="@{/product/list(keyword=${keyword}, categoryId=${categoryId}, sortBy='sales')}">销量</a>
                            <a th:class="${sortBy == 'price_asc'} ? 'active' : ''"
                               th:href="@{/product/list(keyword=${keyword}, categoryId=${categoryId}, sortBy='price_asc')}">价格低</a>
                            <a th:class="${sortBy == 'price_desc'} ? 'active' : ''"
                               th:href="@{/product/list(keyword=${keyword}, categoryId=${categoryId}, sortBy='price_desc')}">价格高</a>
                        </div>
                    </div>
                </div>

                <!-- 商品网格 -->
                <div class="product-grid">
                    <div class="row">
                        <div class="col-md-3" th:each="product : ${page.list}">
                            <div class="product-card">
                                <a th:href="@{/product/detail/{id}(id=${product.id})}" class="product-image">
                                    <img th:src="${product.mainImage}" alt="${product.productName}">
                                </a>
                                <div class="product-info">
                                    <h3 class="product-title">
                                        <a th:href="@{/product/detail/{id}(id=${product.id})}" th:text="${product.productName}"></a>
                                    </h3>
                                    <div class="product-price">
                                        <span class="price" th:if="${product.minPrice == product.maxPrice}"
                                              th:text="'¥' + ${product.minPrice}"></span>
                                        <span class="price" th:if="${product.minPrice != product.maxPrice}"
                                              th:text="'¥' + ${product.minPrice} + '-' + ${product.maxPrice}"></span>
                                        <span class="sales" th:text="'已售' + ${product.sales}"></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 分页 -->
                <div class="pagination-wrapper" th:if="${page.totalPages > 1}">
                    <nav aria-label="Page navigation">
                        <ul class="pagination justify-content-center">
                            <li class="page-item" th:class="${page.pageNum > 1} ? '' : 'disabled'">
                                <a class="page-link"
                                   th:href="@{/product/list(pageNum=${page.pageNum - 1}, keyword=${keyword}, categoryId=${categoryId}, sortBy=${sortBy})}">
                                    上一页
                                </a>
                            </li>
                            <li class="page-item" th:each="i : ${#numbers.sequence(1, page.totalPages)}"
                                th:class="${page.pageNum == i} ? 'active' : ''">
                                <a class="page-link"
                                   th:href="@{/product/list(pageNum=${i}, keyword=${keyword}, categoryId=${categoryId}, sortBy=${sortBy})}"
                                   th:text="${i}"></a>
                            </li>
                            <li class="page-item" th:class="${page.pageNum < page.totalPages} ? '' : 'disabled'">
                                <a class="page-link"
                                   th:href="@{/product/list(pageNum=${page.pageNum + 1}, keyword=${keyword}, categoryId=${categoryId}, sortBy=${sortBy})}">
                                    下一页
                                </a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
