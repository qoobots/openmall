<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="pagination(page, url)" class="pagination-wrapper mt-4">
    <nav aria-label="Page navigation">
        <ul class="pagination justify-content-center" th:if="${page.totalPages > 1}">
            <!-- 上一页 -->
            <li class="page-item" th:classappend="${page.number == 0 ? 'disabled' : ''}">
                <a class="page-link" 
                   th:href="@{${url}(pageNum=${page.number}, pageSize=${page.size})}" 
                   th:if="${page.number > 0}">
                    上一页
                </a>
                <span class="page-link" th:if="${page.number == 0}">上一页</span>
            </li>
            
            <!-- 第一页 -->
            <li class="page-item" th:if="${page.number > 2}">
                <a class="page-link" th:href="@{${url}(pageNum=1, pageSize=${page.size})}">1</a>
            </li>
            
            <!-- 省略号 -->
            <li class="page-item disabled" th:if="${page.number > 3}">
                <span class="page-link">...</span>
            </li>
            
            <!-- 中间页码 -->
            <li class="page-item" th:each="i : ${#numbers.sequence(
                page.number - 1 < 0 ? 0 : page.number - 1, 
                page.number + 1 >= page.totalPages ? page.totalPages - 1 : page.number + 1)}"
                th:classappend="${i == page.number ? 'active' : ''}">
                <a class="page-link" 
                   th:href="@{${url}(pageNum=${i + 1}, pageSize=${page.size})}" 
                   th:text="${i + 1}">1</a>
            </li>
            
            <!-- 省略号 -->
            <li class="page-item disabled" th:if="${page.number < page.totalPages - 4}">
                <span class="page-link">...</span>
            </li>
            
            <!-- 最后一页 -->
            <li class="page-item" th:if="${page.number < page.totalPages - 3}">
                <a class="page-link" 
                   th:href="@{${url}(pageNum=${page.totalPages}, pageSize=${page.size})}" 
                   th:text="${page.totalPages}">10</a>
            </li>
            
            <!-- 下一页 -->
            <li class="page-item" th:classappend="${page.number >= page.totalPages - 1 ? 'disabled' : ''}">
                <a class="page-link" 
                   th:href="@{${url}(pageNum=${page.number + 2}, pageSize=${page.size})}" 
                   th:if="${page.number < page.totalPages - 1}">
                    下一页
                </a>
                <span class="page-link" th:if="${page.number >= page.totalPages - 1}">下一页</span>
            </li>
        </ul>
        
        <!-- 分页信息 -->
        <div class="pagination-info text-center mt-3" th:if="${page.totalElements > 0}">
            共 <strong th:text="${page.totalElements}">0</strong> 条记录，
            第 <strong th:text="${page.number + 1}">1</strong>/<strong th:text="${page.totalPages}">1</strong> 页
        </div>
        
        <!-- 每页显示条数选择 -->
        <div class="page-size-selector text-center mt-2" th:if="${page.totalElements > 0}">
            <span class="me-2">每页显示：</span>
            <a th:href="@{${url}(pageNum=1, pageSize=10)}" 
               class="badge bg-secondary me-1" 
               th:classappend="${page.size == 10 ? 'bg-primary' : 'bg-secondary'}">10</a>
            <a th:href="@{${url}(pageNum=1, pageSize=20)}" 
               class="badge bg-secondary me-1" 
               th:classappend="${page.size == 20 ? 'bg-primary' : 'bg-secondary'}">20</a>
            <a th:href="@{${url}(pageNum=1, pageSize=50)}" 
               class="badge bg-secondary me-1" 
               th:classappend="${page.size == 50 ? 'bg-primary' : 'bg-secondary'}">50</a>
            <a th:href="@{${url}(pageNum=1, pageSize=100)}" 
               class="badge bg-secondary" 
               th:classappend="${page.size == 100 ? 'bg-primary' : 'bg-secondary'}">100</a>
        </div>
    </nav>
</div>
</html>
