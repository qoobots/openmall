<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: main(~{::title}, ~{::head-link}, ~{::main-content}, ~{::script})}">
<head>
    <title>数据导入导出 - 商家后台</title>
</head>
<body>
    <main th:fragment="main-content">
        <div class="container-fluid">
            <h3 class="mb-4">数据导入导出</h3>

            <div class="row">
                <!-- 导出商品 -->
                <div class="col-md-6 mb-4">
                    <div class="card">
                        <div class="card-header"><h5 class="mb-0"><i class="fas fa-file-export me-2"></i>导出商品</h5></div>
                        <div class="card-body">
                            <p class="text-muted">导出店铺所有商品数据为Excel文件，包含商品名称、分类、品牌、价格、库存等信息。</p>
                            <a th:href="@{/data/export-products}" class="btn btn-success">
                                <i class="fas fa-download me-2"></i>导出商品Excel
                            </a>
                        </div>
                    </div>
                </div>

                <!-- 导出订单 -->
                <div class="col-md-6 mb-4">
                    <div class="card">
                        <div class="card-header"><h5 class="mb-0"><i class="fas fa-file-export me-2"></i>导出订单</h5></div>
                        <div class="card-body">
                            <p class="text-muted">导出店铺所有订单数据为Excel文件，包含订单号、商品明细、金额、物流等信息。</p>
                            <a th:href="@{/data/export-orders}" class="btn btn-success">
                                <i class="fas fa-download me-2"></i>导出订单Excel
                            </a>
                        </div>
                    </div>
                </div>

                <!-- 导入商品 -->
                <div class="col-md-6 mb-4">
                    <div class="card">
                        <div class="card-header"><h5 class="mb-0"><i class="fas fa-file-import me-2"></i>导入商品</h5></div>
                        <div class="card-body">
                            <p class="text-muted">上传Excel文件批量导入商品，请确保文件格式与导出模板一致。</p>
                            <div class="mb-3">
                                <a th:href="@{/data/export-products}" class="btn btn-sm btn-outline-secondary">
                                    <i class="fas fa-download me-1"></i>下载模板
                                </a>
                            </div>
                            <form id="importForm" enctype="multipart/form-data">
                                <div class="mb-3">
                                    <input type="file" class="form-control" name="file" id="importFile"
                                           accept=".xlsx,.xls" required>
                                </div>
                                <button type="submit" class="btn btn-primary" id="importBtn">
                                    <i class="fas fa-upload me-2"></i>上传导入
                                </button>
                            </form>
                            <div id="importResult" class="mt-3" style="display:none;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script th:fragment="script">
    <script>
        $(function() {
            $('#importForm').submit(function(e) {
                e.preventDefault();
                var formData = new FormData();
                formData.append('file', $('#importFile')[0].files[0]);

                $('#importBtn').prop('disabled', true).html('<i class="fas fa-spinner fa-spin"></i> 导入中...');

                $.ajax({
                    url: '/data/import-products',
                    type: 'POST',
                    data: formData,
                    processData: false,
                    contentType: false,
                    success: function(res) {
                        $('#importBtn').prop('disabled', false).html('<i class="fas fa-upload me-2"></i>上传导入');
                        var alertClass = res.code === 200 ? 'alert-success' : 'alert-danger';
                        $('#importResult').show().html(
                            '<div class="alert ' + alertClass + '">' + res.message + '</div>'
                        );
                    },
                    error: function() {
                        $('#importBtn').prop('disabled', false).html('<i class="fas fa-upload me-2"></i>上传导入');
                        $('#importResult').show().html(
                            '<div class="alert alert-danger">导入失败，请检查文件格式</div>'
                        );
                    }
                });
            });
        });
    </script>
    </script>
</body>
</html>
