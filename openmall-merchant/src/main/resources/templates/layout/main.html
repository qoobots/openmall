<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="main(title, css, content, js)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">商家后台 - OpenMall</title>
    
    <!-- Bootstrap CSS -->
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 自定义CSS -->
    <link th:href="@{/css/admin.css}" rel="stylesheet">
    
    <th:block th:replace="${css}" />
</head>
<body>
    <div class="wrapper">
        <!-- 侧边栏 -->
        <nav id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <h3><i class="fas fa-store"></i> 商家后台</h3>
            </div>
            
            <ul class="list-unstyled components">
                <li>
                    <a th:href="@{/dashboard}">
                        <i class="fas fa-tachometer-alt"></i> 控制台
                    </a>
                </li>
                <li>
                    <a href="#productSubmenu" data-bs-toggle="collapse" aria-expanded="false" class="dropdown-toggle">
                        <i class="fas fa-box"></i> 商品管理
                    </a>
                    <ul class="collapse list-unstyled" id="productSubmenu">
                        <li><a th:href="@{/product/list}">商品列表</a></li>
                        <li><a th:href="@{/product/add}">发布商品</a></li>
                        <li><a th:href="@{/product/category}">分类管理</a></li>
                    </ul>
                </li>
                <li>
                    <a href="#orderSubmenu" data-bs-toggle="collapse" aria-expanded="false" class="dropdown-toggle">
                        <i class="fas fa-shopping-cart"></i> 订单管理
                    </a>
                    <ul class="collapse list-unstyled" id="orderSubmenu">
                        <li><a th:href="@{/order/list}">订单列表</a></li>
                        <li><a th:href="@{/order/refund}">售后管理</a></li>
                    </ul>
                </li>
                <li>
                    <a href="#shopSubmenu" data-bs-toggle="collapse" aria-expanded="false" class="dropdown-toggle">
                        <i class="fas fa-store-alt"></i> 店铺管理
                    </a>
                    <ul class="collapse list-unstyled" id="shopSubmenu">
                        <li><a th:href="@{/shop/info}">店铺信息</a></li>
                        <li><a th:href="@{/shop/decoration}">店铺装修</a></li>
                    </ul>
                </li>
                <li>
                    <a href="#promoSubmenu" data-bs-toggle="collapse" aria-expanded="false" class="dropdown-toggle">
                        <i class="fas fa-tags"></i> 营销管理
                    </a>
                    <ul class="collapse list-unstyled" id="promoSubmenu">
                        <li><a th:href="@{/promotion/coupon}">优惠券</a></li>
                        <li><a th:href="@{/promotion/discount}">限时折扣</a></li>
                    </ul>
                </li>
                <li>
                    <a th:href="@{/statistics}">
                        <i class="fas fa-chart-line"></i> 数据统计
                    </a>
                </li>
            </ul>
        </nav>

        <!-- 主内容区 -->
        <div id="content">
            <!-- 顶部导航 -->
            <nav class="navbar navbar-expand-lg navbar-light bg-light">
                <button type="button" id="sidebarCollapse" class="btn btn-info">
                    <i class="fas fa-align-left"></i>
                </button>
                <div class="ms-auto">
                    <ul class="navbar-nav">
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown">
                                <i class="fas fa-user-circle"></i> <span th:text="${#authentication.principal.nickname}"></span>
                            </a>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" href="#"><i class="fas fa-user"></i> 个人中心</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li><a class="dropdown-item" th:href="@{/auth/logout}"><i class="fas fa-sign-out-alt"></i> 退出登录</a></li>
                            </ul>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- 页面内容 -->
            <div class="container-fluid">
                <div th:replace="${content}"></div>
            </div>
        </div>
    </div>

    <!-- jQuery -->
    <script th:src="@{/js/jquery-3.6.0.min.js}"></script>
    <!-- Bootstrap JS -->
    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <th:block th:replace="${js}" />
</body>
</html>
