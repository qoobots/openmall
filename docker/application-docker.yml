# Docker Environment Configuration File

# Database Configuration
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/openmall?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=openmall
spring.datasource.password=openmall123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Redis Configuration
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=6379
spring.redis.database=0

# Server Configuration
server.port=8080

# Logging Configuration
logging.level.root=INFO
logging.level.com.qoobot.openmall=DEBUG

# Actuator Monitoring Endpoints
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always